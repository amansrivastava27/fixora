{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow p-5 register-card">

                <h2 class="text-center mb-4 fw-bold">
                    Worker Registration
                </h2>

                <form method="POST">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>

                            <input
                                type="text"
                                name="full_name"
                                class="form-control custom-input"
                                required
                            >
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone</label>

                            <input
                                type="text"
                                name="phone"
                                class="form-control custom-input"
                                required
                            >
                        </div>

                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>

                        <input
                            type="email"
                            name="email"
                            class="form-control custom-input"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>

                        <input
                            type="password"
                            name="password"
                            class="form-control custom-input"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Profession</label>

                        <select
                            name="profession"
                            class="form-control custom-input"
                        >
                            <option>Plumber</option>
                            <option>Electrician</option>
                            <option>Carpenter</option>
                            <option>Painter</option>
                            <option>Labor</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Experience</label>

                        <input
                            type="text"
                            name="experience"
                            class="form-control custom-input"
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Daily Charges</label>

                        <input
                            type="text"
                            name="charges"
                            class="form-control custom-input"
                        >
                    </div>

                    <button class="btn btn-warning w-100 custom-btn">
                        Register Worker
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
